<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sinu Arcade | منصة الألعاب</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg-color: #0d0e12; --pve-color: #00ff87; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        
        /* العجلة الملونة */
        .wheel {
            width: 250px; height: 250px; border-radius: 50%;
            border: 8px solid #262936; margin: 20px auto;
            background: conic-gradient(#ff3e3e 0deg 90deg, #ffb700 90deg 180deg, #00ff87 180deg 270deg, #3e7dff 270deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; background: var(--pve-color); font-weight: bold; }
        #log-zone { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <h1>Sinu Arcade</h1>
    <div id="wheel" class="wheel"></div>
    
    <button onclick="connectWallet()">ربط المحفظة</button>
    <button onclick="playAgainstComputer()">اللعب ضد الكمبيوتر (PvE)</button>
    <input type="text" id="target-address" placeholder="عنوان الخصم للـ PvP">
    <button onclick="createChallenge()">تحدي لاعب (PvP)</button>

    <div id="log-zone"></div>

    <script>
        let provider, signer, contract;
        const contractAddress = "0x3E71427c4F4c3aE6DBA472Ccb17076E2148A1231"; // ضع عنوان عقدك هنا
        const contractABI = [
            "function executePveAssassination() external",
            "function createBountyChallenge(address _target, uint256 _amount) external"
        ];

        async function checkNetwork() {
            const chainId = await window.ethereum.request({ method: 'eth_chainId' });
            if (chainId !== '0x2105') { alert("يرجى التبديل إلى شبكة Base!"); return false; }
            return true;
        }

        async function connectWallet() {
            if (window.ethereum && (await checkNetwork())) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                contract = new ethers.Contract(contractAddress, contractABI, signer);
                logMessage("✅ تم ربط المحفظة.");
            }
        }

        async function playAgainstComputer() {
            if (!contract || !(await checkNetwork())) return;
            try {
                logMessage("🤖 جاري اللعب ضد الكمبيوتر...");
                document.getElementById('wheel').style.transform = "rotate(1440deg)";
                const tx = await contract.executePveAssassination();
                await tx.wait();
                logMessage("✅ تم تنفيذ الضربة بنجاح!");
            } catch (e) { logMessage("❌ فشلت المواجهة."); }
        }

        async function createChallenge() {
            const target = document.getElementById('target-address').value;
            if (!contract || !target) return alert("يرجى إدخال عنوان الخصم!");
            try {
                logMessage("⚔️ جاري إنشاء التحدي...");
                const tx = await contract.createBountyChallenge(target, ethers.utils.parseUnits("1000", 18));
                await tx.wait();
                logMessage("🎯 تم إرسال التحدي!");
            } catch (e) { logMessage("❌ فشل إنشاء التحدي."); }
        }

        function logMessage(text) {
            const logZone = document.getElementById('log-zone');
            logZone.innerHTML = `<div>• ${text}</div>` + logZone.innerHTML;
        }
    </script>
</body>
</html>
